version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: healthcare-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_secure_pass
      MONGO_INITDB_DATABASE: healthcare
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./data/healthcare_dataset.csv:/data/healthcare_dataset.csv:ro
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthcare-migration
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
      - ./src:/app/src
    environment:
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=healthcare
      - MONGO_USER=migrate_user
      - MONGO_PASSWORD=migrate_pass
      - CSV_PATH=/app/data/healthcare_dataset.csv
    networks:
      - healthcare-network
    command: ["python", "-u", "src/migrate.py"]

volumes:
  mongo_data:
    driver: local

networks:
  healthcare-network:
    driver: bridge
