services:
  mongo:
    image: mongo:7.0
    container_name: healthcare-mongo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_DATABASE: healthcare
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./data/healthcare_dataset.csv:/data/healthcare_dataset.csv:ro
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthcare-migration
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
      - ./src:/app/src
    env_file:
      - .env
    networks:
      - healthcare-network
    command: ["python", "-u", "src/migrate.py"]

volumes:
  mongo_data:
    driver: local

networks:
  healthcare-network:
    driver: bridge
